<h2 id="markdown-文档注释">Markdown 文档注释</h2>
<p>从 Java 23 开始，Java 支持使用 Markdown 文档注释。Markdown 文档注释用 <code>///</code> 标记。</p>
<p>下图中左边是传统文档注释，右边是 Markdown 文档注释。</p>
<p><img src="/assets/img/cheatsheet/java/md-comments-diff.png" alt="传统文档注释和 Markdown 文档注释的区别"/></p>
<p>Markdown 注释支持 CommonMark 标准，简单的 GFM 表格也是支持的。</p>
