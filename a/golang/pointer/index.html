<!DOCTYPE html>
<p>Go 语言有指针类型。惊不惊喜？</p>
<p>指针的值是一个内存地址。类型 <code>*T</code> 是一个指向 <code>T</code> 类型值的指针。指针的零值是 <code>nil</code>。</p>
<p>可以像下面这这样声明一个指针：</p>
<pre class="astro-code" style="background-color:#0d1117;overflow-x:auto"><code><span class="line"><span style="color:#FF7B72">var</span><span style="color:#C9D1D9"> p </span><span style="color:#FF7B72">*int</span><span style="color:#C9D1D9"> </span><span style="color:#8B949E">// p 是指向 int 值的指针</span></span></code></pre>
<p>使用操作符 <code>&amp;</code>（取地址操作符）来获取一个值的地址。比如：</p>
<pre class="astro-code" style="background-color:#0d1117;overflow-x:auto"><code><span class="line"><span style="color:#C9D1D9">i </span><span style="color:#FF7B72">:=</span><span style="color:#C9D1D9"> </span><span style="color:#79C0FF">42</span></span>
<span class="line"><span style="color:#C9D1D9">p </span><span style="color:#FF7B72">=</span><span style="color:#C9D1D9"> </span><span style="color:#FF7B72">&amp;</span><span style="color:#C9D1D9">i</span></span></code></pre>
<p>使用操作符 <code>*</code>（解引用操作符）表示指针所指向的值。比如：</p>
<pre class="astro-code" style="background-color:#0d1117;overflow-x:auto"><code><span class="line"><span style="color:#C9D1D9">fmt.</span><span style="color:#79C0FF">Println</span><span style="color:#C9D1D9">(</span><span style="color:#FF7B72">*</span><span style="color:#C9D1D9">p) </span><span style="color:#8B949E">// 通过指针 p 读取 i 的值</span></span>
<span class="line"><span style="color:#FF7B72">*</span><span style="color:#C9D1D9">p </span><span style="color:#FF7B72">=</span><span style="color:#C9D1D9"> </span><span style="color:#79C0FF">21</span><span style="color:#C9D1D9">         </span><span style="color:#8B949E">// 通过指针 p 设置 i 的值</span></span></code></pre>
